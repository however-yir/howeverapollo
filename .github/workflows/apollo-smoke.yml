name: apollo-smoke

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  repo-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python test dependency
        run: pip install pytest

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Shell syntax check
        run: |
          bash -n apollo.sh
          bash -n collect_pre.sh
          bash -n scripts/apollo_build.sh
          bash -n scripts/apollo_test.sh
          bash -n scripts/deploy_local_sanity_check.sh

      - name: Python syntax check
        run: |
          python3 -m py_compile \
            scripts/clear.py \
            scripts/command_checker.py \
            scripts/find_all_package.py \
            scripts/performance_parse.py

      - name: Run Python tests for fork scripts
        run: pytest tests/howeverapollo -q

      - name: Run minimal Bazel tests
        env:
          USE_BAZEL_VERSION: "6.5.0"
        run: |
          for attempt in 1 2 3; do
            echo "Bazel test attempt ${attempt}/3"
            if bazel test \
              //tests/howeverapollo:command_checker_fast_test \
              //tests/howeverapollo:find_all_package_fast_test \
              //tests/howeverapollo:deploy_dry_run_fast_test; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              echo "Bazel test failed, retrying in 20s..."
              sleep 20
            fi
          done
          echo "Bazel test failed after 3 attempts."
          exit 1

      - name: Execute deploy script dry-run
        run: bash scripts/deploy_local_sanity_check.sh --dry-run

      - name: Verify key docs and entry files
        run: |
          test -f README.md
          test -f docs/README.md
          test -f docs/MAINPAGE_cn.md
          test -f scripts/apollo_build.sh
          test -f scripts/apollo_test.sh
