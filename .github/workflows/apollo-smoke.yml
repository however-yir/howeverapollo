name: apollo-smoke

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  repo-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          bash -n apollo.sh
          bash -n collect_pre.sh
          bash -n scripts/apollo_build.sh
          bash -n scripts/apollo_test.sh
          bash -n scripts/deploy_local_sanity_check.sh

      - name: Python syntax check
        run: |
          python3 -m py_compile \
            scripts/clear.py \
            scripts/command_checker.py \
            scripts/find_all_package.py \
            scripts/performance_parse.py

      - name: Verify key docs and entry files
        run: |
          test -f README.md
          test -f docs/README.md
          test -f docs/MAINPAGE_cn.md
          test -f scripts/apollo_build.sh
          test -f scripts/apollo_test.sh
