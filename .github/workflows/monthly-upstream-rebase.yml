# Modified by however-yir autonomous driving team.
name: monthly-upstream-rebase

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase Master From Upstream
        run: |
          bash scripts/maintenance/monthly_upstream_rebase.sh master https://github.com/ApolloAuto/apollo.git
